name: CMake build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# Build matrix intentionally covers Ubuntu only:
#   * All heavy dependencies (Qt6, PCL, OpenCV, VTK) are available from apt
#     on Ubuntu 24.04 (noble), so the job finishes in a few minutes.
#   * Building the same stack on Windows requires vcpkg, which needs
#     30-60+ minutes per run — too heavy for CI. The CMake project itself
#     still supports Windows via vcpkg locally (see CMakeLists.txt).
#   * OpenNI2 is Windows-only and disabled by default on Linux
#     (ASTRA_ENABLE_OPENNI2 defaults to OFF on non-Windows); the emulation
#     build path exercises every other subsystem.

jobs:
  build-linux:
    name: Ubuntu / ${{ matrix.c_compiler }} / ${{ matrix.build_type }}
    runs-on: ubuntu-24.04

    strategy:
      fail-fast: false
      matrix:
        build_type: [Release]
        include:
          - c_compiler: gcc
            cpp_compiler: g++
          - c_compiler: clang
            cpp_compiler: clang++

    steps:
    - uses: actions/checkout@v4

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          build-essential \
          ninja-build \
          cmake \
          pkg-config \
          qt6-base-dev \
          qt6-base-dev-tools \
          libqt6opengl6-dev \
          libqt6openglwidgets6 \
          libgl1-mesa-dev \
          libpcl-dev \
          libopencv-dev \
          libvtk9-dev \
          libvtk9-qt-dev \
          libeigen3-dev \
          libflann-dev \
          libboost-all-dev

    - name: Configure CMake
      run: >
        cmake -S ${{ github.workspace }} -B ${{ github.workspace }}/build
        -G Ninja
        -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
        -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
        -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
        -DASTRA_ENABLE_OPENNI2=OFF

    - name: Build
      run: cmake --build ${{ github.workspace }}/build --config ${{ matrix.build_type }}
